{% extends 'home.html' %}

{% block content %}
<div class="AssetsFolderContainer">
    {% for folder in folders %}

    <div id="{{folder}}" onclick=show(this.id)>
        <span style="display: inline-block;">{{loop.index}}</span>
        <span style="display: inline-block;">{{folder}}</span> 
        <a href=></a>
    </div>

    {% endfor %}
</div>



<script>
    function show(name) {
        location.href = `/assets/folder/${name}`
    }
</script>

{% endblock %}
